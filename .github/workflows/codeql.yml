name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "33 3 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4.35.5
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v4.35.5
