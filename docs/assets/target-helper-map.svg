<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">StaleZero target helper map</title>
  <desc id="desc">A compact map of mutation consequences across cache, browser, data, messaging, and product domains.</desc>
  <rect width="1200" height="520" fill="#f6f8fa"/>
  <rect x="54" y="52" width="1092" height="416" rx="18" fill="#ffffff" stroke="#d0d7de"/>
  <text x="90" y="104" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="800" fill="#0d1117">One mutation. Every consequence mapped.</text>
  <text x="90" y="136" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#57606a">52 target helpers cover cache, browsers, data stores, queues, sockets, observability, and product domains.</text>
  <g transform="translate(90 180)">
    <rect width="230" height="190" rx="14" fill="#0d1117"/>
    <text x="24" y="42" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="800" fill="#ffffff">ProductChanged</text>
    <text x="24" y="78" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#a5f3fc">preview -> execute -> receipt</text>
    <text x="24" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#ffffff">risk: high</text>
    <text x="24" y="144" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#ffffff">targets: 52</text>
    <text x="24" y="172" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#ffffff">receipt: signed</text>
  </g>
  <g stroke="#16a34a" stroke-width="4" stroke-linecap="round">
    <path d="M335 238 C410 216 448 212 512 224"/>
    <path d="M335 272 C420 276 452 276 512 276"/>
    <path d="M335 306 C410 336 450 344 512 328"/>
  </g>
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#0d1117">
    <g transform="translate(532 174)">
      <rect width="178" height="56" rx="10" fill="#ecfdf5" stroke="#86efac"/>
      <text x="18" y="34" font-weight="700">CDN + Edge</text>
    </g>
    <g transform="translate(532 250)">
      <rect width="178" height="56" rx="10" fill="#eff6ff" stroke="#93c5fd"/>
      <text x="18" y="34" font-weight="700">Browser + Client</text>
    </g>
    <g transform="translate(532 326)">
      <rect width="178" height="56" rx="10" fill="#fff7ed" stroke="#fdba74"/>
      <text x="18" y="34" font-weight="700">Data + Storage</text>
    </g>
    <g transform="translate(760 174)">
      <rect width="178" height="56" rx="10" fill="#f5f3ff" stroke="#c4b5fd"/>
      <text x="18" y="34" font-weight="700">Queues + Events</text>
    </g>
    <g transform="translate(760 250)">
      <rect width="178" height="56" rx="10" fill="#fef2f2" stroke="#fca5a5"/>
      <text x="18" y="34" font-weight="700">Security Gates</text>
    </g>
    <g transform="translate(760 326)">
      <rect width="178" height="56" rx="10" fill="#f0fdfa" stroke="#5eead4"/>
      <text x="18" y="34" font-weight="700">Product Domains</text>
    </g>
    <g transform="translate(988 250)">
      <rect width="108" height="56" rx="10" fill="#0d1117"/>
      <text x="25" y="34" fill="#ffffff" font-weight="800">Receipt</text>
    </g>
  </g>
  <g stroke="#94a3b8" stroke-width="3" stroke-linecap="round">
    <path d="M710 202 H760"/>
    <path d="M710 278 H760"/>
    <path d="M710 354 H760"/>
    <path d="M938 202 C966 210 984 230 1004 250"/>
    <path d="M938 278 H988"/>
    <path d="M938 354 C966 346 984 326 1004 306"/>
  </g>
</svg>
